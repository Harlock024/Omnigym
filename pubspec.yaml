name: omnigym
description: "SaaS B2B para gestión integral de cadenas de gimnasios con cumplimiento SAT."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0
  cloud_functions: ^5.0.0

  # Estado
  flutter_riverpod: ^2.6.0

  # Navegación
  go_router: ^14.0.0

  # Modelos inmutables (requiere build_runner)
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
